# Data source configuration with primary/fallback
market_data:
  nikkei:
    symbol: "^N225"
    source: "yfinance"
    fallback_symbol: "^N225"
    fallback_source: "stooq"
  nikkei_futures:
    symbol: "NKD=F"
    source: "yfinance"
  sp500:
    symbol: "^GSPC"
    source: "yfinance"
  nasdaq:
    symbol: "^IXIC"
    source: "yfinance"
  dow:
    symbol: "^DJI"
    source: "yfinance"
  vix:
    symbol: "^VIX"
    source: "yfinance"
  topix:
    symbol: "^TPX"
    source: "yfinance"

fx:
  usdjpy:
    symbol: "JPY=X"
    source: "yfinance"
  eurjpy:
    symbol: "EURJPY=X"
    source: "yfinance"
  cnyjpy:
    symbol: "CNYJPY=X"
    source: "yfinance"

commodities:
  wti_oil:
    symbol: "CL=F"
    source: "yfinance"
  brent_oil:
    symbol: "BZ=F"
    source: "yfinance"
  gold:
    symbol: "GC=F"
    source: "yfinance"
  copper:
    symbol: "HG=F"
    source: "yfinance"

bonds:
  us_10y:
    symbol: "^TNX"
    source: "yfinance"
  jp_10y:
    fred_series: "IRLTLT01JPM156N"
    source: "fred"

macro:
  fred_series:
    - id: "FEDFUNDS"
      name: "Fed Funds Rate"
    - id: "CPIAUCSL"
      name: "US CPI"
    - id: "UNRATE"
      name: "US Unemployment Rate"
    - id: "GDP"
      name: "US GDP"
    - id: "T10Y2Y"
      name: "10Y-2Y Spread"
